<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himawari-9 衛星即時觀測系統</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h1>Himawari-9 🛰️</h1>
                <p>Real-time Observation System</p>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <h3>影像模式 (View Mode)</h3>
                    <button class="btn mode-btn active" data-mode="true_color">
                        🌍 真彩色 (True Color)
                        <span class="btn-subtext">綠光增強校正</span>
                    </button>
                    <button class="btn mode-btn" data-mode="ir">
                        🌡️ 紅外線 (Infrared)
                        <span class="btn-subtext">夜間/亮溫映射 (Band 14)</span>
                    </button>
                </div>

                <div class="control-group">
                    <h3>區域選擇 (Region)</h3>
                    <button class="btn region-btn" data-region="global">
                        🌐 全球全景 (Global)
                        <span class="btn-subtext">全圓盤</span>
                    </button>
                    <button class="btn region-btn" data-region="asia">
                        🌏 東亞區域 (Asia)
                        <span class="btn-subtext">局部特寫</span>
                    </button>
                    <button class="btn region-btn active" data-region="taiwan">
                        🇹🇼 台灣特寫 (Taiwan)
                        <span class="btn-subtext">高解析度</span>
                    </button>
                </div>

                <div class="control-group">
                    <h3>歷史影像 (History)</h3>
                    <select id="history-selector" class="history-select">
                        <option value="latest">即時最新 (Live)</option>
                    </select>
                </div>

                <div class="info-group">
                    <h3>狀態與資訊 (Status)</h3>
                    <div class="status-item">
                        <span class="status-label">資料時間:</span>
                        <span class="status-value" id="timestamp-display">載入中...</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">更新頻率:</span>
                        <span class="status-value">每 10 分鐘</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">狀態:</span>
                        <span class="status-indicator"></span>
                        <span class="status-value" id="system-status">連線中</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">系統監控:</span>
                        <a href="status.html" class="status-value text-accent" style="text-decoration: none; display: flex; align-items: center; gap: 4px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                            儀表板
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <p>Data provided by NOAA AWS Open Data</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="image-container" id="image-container">
                <div id="loader-container">
                    <div class="loader-wrapper">
                        <div class="loader"></div>
                        <div id="loading-percent" class="loading-percent">0%</div>
                    </div>
                    <div id="loading-text" class="loading-text">Initial satellite rendering in progress...</div>
                </div>
                <img id="satellite-img" src="" alt="Himawari-9 Satellite Image" class="hidden">
            </div>
        </main>

        <!-- Right Side Live Logs Panel -->
        <aside class="log-panel glass-panel">
            <div class="log-header">
                <h3>即時運算日誌 (Live Logs)</h3>
            </div>
            <div class="log-content" id="live-log-content">
                <div class="log-line">Waiting for logs...</div>
            </div>
        </aside>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
