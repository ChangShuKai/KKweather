name: 氣象衛星每10分鐘極速解析任務

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許手動點擊測試

# 關鍵設定：允許這個自動化任務對你的 GitHub 倉庫進行寫入與 Push
permissions:
  contents: write

jobs:
  run-processor:
    runs-on: ubuntu-latest

    steps:
    - name: 複製專案程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 安裝氣象大算力套件
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow webp requests

    - name: 🛠️ 安裝系統級氣象套件依賴
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libproj-dev proj-data proj-bin libgeos-dev

    - name: 📦 安裝氣象大算力套件
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow webp requests psutil satpy pyresample pycoast dask pykdtree xarray h5netcdf netCDF4 matplotlib scipy boto3

    - name: 🚀 執行衛星圖極速生成
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        mkdir -p backend/shapefiles
        cd backend/shapefiles
        if [ ! -f "GSHHS_c_L1.shp" ]; then
          wget -q https://www.ngdc.noaa.gov/mgg/shorelines/data/gshhg/latest/gshhg-shp-2.3.7.zip -O gshhg.zip
          unzip -q gshhg.zip
          find . -name "*.shp" -o -name "*.shx" -o -name "*.dbf" -o -name "*.prj" -exec mv {} . \;
          rm -rf GSHHS_shp WDBII_shp gshhg.zip
        fi
        cd ../..
        python backend/main.py

    - name: 💾 自動同步最新衛星圖回倉庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 1. 先拉取最新進度，防止衝突
        git pull --rebase --autostash origin main
        
        # 2. 🔥 終極防錯：先手動幫它建立這兩個資料夾，確保路徑 100% 存在，Git 就不會報錯
        mkdir -p backend/static/images
        mkdir -p frontend/static/images
        
        # 3. 🔥 用最安全的方式加入檔案
        git add backend/static/images/ || true
        git add frontend/static/images/ || true
        git add backend/latest.json || true
        
        # 4. 如果有已暫存的圖片更新，就 Commit 並 Push
        git diff --cached --quiet || git commit -m "🤖 自動更新【台灣/亞洲/全景】衛星圖 [skip ci]"
        git push || true

