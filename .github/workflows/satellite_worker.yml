name: 氣象衛星每10分鐘極速解析任務

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許手動點擊測試

# 關鍵設定：允許這個自動化任務對你的 GitHub 倉庫進行寫入與 Push
permissions:
  contents: write

jobs:
  run-processor:
    runs-on: ubuntu-latest

    steps:
    - name: 複製專案程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 安裝氣象大算力套件
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow webp requests

    - name: 📦 安裝氣象大算力套件
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow webp requests psutil  # <-- 這裡多加上 psutil

    - name: 💾 自動同步最新衛星圖回倉庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 🔥 【新增這行】先拉取你在電腦上更新的最新程式碼，避免衝突！
        git pull --rebase origin main
        
        # 用 * 號把所有算好的新圖片加進來
        git add backend/static/images/*.webp
        git add frontend/static/images/*.webp
        
        git diff-index --quiet HEAD || git commit -m "🤖 自動更新【台灣/亞洲/全景】衛星圖 [skip ci]"
        git push
