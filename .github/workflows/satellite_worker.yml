name: 氣象衛星每10分鐘極速解析任務

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許手動點擊測試

# 關鍵設定：允許這個自動化任務對你的 GitHub 倉庫進行寫入與 Push
permissions:
  contents: write

jobs:
  run-processor:
    runs-on: ubuntu-latest

    steps:
    - name: 複製專案程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 安裝氣象大算力套件
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow webp requests

    - name: 🚀 啟動衛星資料解析 (main.py)
      run: |
        cd backend
        python main.py

    # 新增這一步：自動將產生的最新圖片 Commit 並 Push 回去
    - name: 自動同步最新圖片回倉庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 檢查 static/images 資料夾底下有沒有新圖片變動
        git add static/images/*.webp
        
        # 如果有新圖片才提交，沒有的話就跳過（避免程式報錯）
        git diff-index --quiet HEAD || git commit -m "🤖 自動更新最新向日葵衛星圖 [skip ci]"
        
        # 把圖片推回 GitHub 專案
        git push