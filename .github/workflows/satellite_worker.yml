name: 氣象衛星每10分鐘極速解析任務

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: # 允許手動點擊測試

# 關鍵設定：允許這個自動化任務對你的 GitHub 倉庫進行寫入與 Push
permissions:
  contents: write

jobs:
  run-processor:
    runs-on: ubuntu-latest

    steps:
    - name: 複製專案程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 安裝氣象大算力套件
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow webp requests

    - name: 📦 安裝氣象大算力套件
      run: |
        python -m pip install --upgrade pip
        pip install numpy pillow webp requests psutil  # <-- 這裡多加上 psutil

     - name: 💾 自動同步最新衛星圖回倉庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # 1. 先拉取最新進度，防止衝突
        git pull --rebase origin main
        
        # 2. 🔥 終極防錯：先手動幫它建立這兩個資料夾，確保路徑 100% 存在，Git 就不會報錯
        mkdir -p backend/static/images
        mkdir -p frontend/static/images
        
        # 3. 🔥 用最安全的方式加入變動的 webp 檔案（就算沒有新檔也不會崩潰）
        git add backend/static/images/*.webp || true
        git add frontend/static/images/*.webp || true
        
        # 4. 如果圖片有更新，就 Commit 並 Push
        git diff-index --quiet HEAD || git commit -m "🤖 自動更新【台灣/亞洲/全景】衛星圖 [skip ci]"
        git push
